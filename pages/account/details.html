<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Account details — release</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@300;400;500;600&family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/styles.css">
</head>
<body class="min-h-screen">
<div data-release-header></div>

<section class="page-banner text-center">
  <div class="mx-auto max-w-[1200px] px-6">
    <div class="crumbs mb-6"><a href="../../index.html">Home</a><span class="sep">/</span><a href="index.html">My account</a><span class="sep">/</span><span>Details</span></div>
    <h1>Account <em class="font-wonk font-normal">details</em></h1>
    <p>Update your contact information and email preferences.</p>
  </div>
</section>

<section class="onlight bg-white">
  <div class="mx-auto max-w-[1600px] px-6 md:px-10 py-16 md:py-20 grid grid-cols-1 md:grid-cols-12 gap-10">

    <aside class="md:col-span-3">
      <nav class="acct-rail">
        <a href="index.html">Overview <span>›</span></a>
        <a href="orders.html">Orders <span>›</span></a>
        <a href="addresses.html">Addresses <span>›</span></a>
        <a href="details.html" class="active">Account details <span>›</span></a>
        <a href="../login.html" class="text-[#b4332a] hover:text-[#b4332a]/70">Log out <span>›</span></a>
      </nav>
    </aside>

    <main class="md:col-span-9 max-w-[640px]">
      <form class="space-y-6" onsubmit="event.preventDefault()">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <label class="block"><span class="auth-label">First name</span><input class="auth-input" value="Jane"/></label>
          <label class="block"><span class="auth-label">Last name</span><input class="auth-input" value="Doe"/></label>
        </div>
        <label class="block"><span class="auth-label">Email</span><input type="email" class="auth-input" value="jane@example.com"/></label>
        <label class="block"><span class="auth-label">Phone</span><input type="tel" class="auth-input" value="+48 600 000 000"/></label>

        <div class="pt-2">
          <button class="inline-flex h-10 px-7 rounded-full bg-black text-white text-[11px] tracking-wide2 uppercase font-medium pill pill-dark">Save changes</button>
        </div>

        <hr class="my-8 hairline border-t"/>

        <h3 class="text-[14px] tracking-wide2 uppercase text-black/55 mb-4">Email preferences</h3>
        <label class="flex items-start gap-3 text-[13px] text-black/75 leading-[1.7]">
          <input type="checkbox" checked class="mt-1"/>
          <span>Send me product updates, sale alerts and new collection announcements.</span>
        </label>
        <label class="flex items-start gap-3 text-[13px] text-black/75 leading-[1.7]">
          <input type="checkbox" class="mt-1"/>
          <span>Send me restock notifications for items in my wishlist.</span>
        </label>

        <hr class="my-8 hairline border-t"/>

        <h3 class="text-[14px] tracking-wide2 uppercase text-black/55 mb-4">Change password</h3>
        <label class="block"><span class="auth-label">Current password</span><input type="password" class="auth-input"/></label>
        <label class="block"><span class="auth-label">New password</span><input type="password" class="auth-input"/></label>
        <label class="block"><span class="auth-label">Confirm new password</span><input type="password" class="auth-input"/></label>
        <div class="pt-2">
          <button class="inline-flex h-10 px-7 rounded-full border hairline text-[11px] tracking-wide2 uppercase font-medium pill">Update password</button>
        </div>
      </form>
    </main>

  </div>
</section>

<div data-release-footer></div>
<script src="../../assets/partials.js"></script>
</body>
</html>
