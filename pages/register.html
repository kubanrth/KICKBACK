<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Załóż konto — Kickback</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@300;400;500;600&family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="min-h-screen">
<div data-release-header></div>

<section class="onlight bg-white">
  <div class="grid grid-cols-1 md:grid-cols-2">
    <div class="hidden md:block relative md:min-h-[640px] overflow-hidden">
      <img src="../brand_assets/photos/banner-konto.png" alt="" class="absolute inset-0 h-full w-full object-cover"/>
    </div>

    <div class="flex items-center md:pl-16 lg:pl-24 px-6 md:px-8 py-12 md:py-20">
      <div class="w-full max-w-[460px]">
        <h1 class="h-section text-[26px] md:text-[36px] mb-8 md:mb-10">Załóż konto</h1>

        <form class="space-y-5" onsubmit="event.preventDefault();try{localStorage.setItem('demo_auth','1');localStorage.setItem('demo_auth_email',this.elements.email.value||'demo@kickback.pl');}catch(e){}location.href='account/index.html'">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="auth-label">Imię<span class="text-[#b4332a]">*</span></span>
              <input class="auth-input" placeholder="Imię" required/>
            </label>
            <label class="block">
              <span class="auth-label">Nazwisko<span class="text-[#b4332a]">*</span></span>
              <input class="auth-input" placeholder="Nazwisko" required/>
            </label>
          </div>
          <label class="block">
            <span class="auth-label">E-mail<span class="text-[#b4332a]">*</span></span>
            <input type="email" name="email" class="auth-input" placeholder="twoj@email.pl" required/>
          </label>
          <label class="block">
            <span class="auth-label">Hasło<span class="text-[#b4332a]">*</span></span>
            <input type="password" class="auth-input" placeholder="••••••••" required/>
          </label>
          <button type="submit" class="btn-ghost-dark pill inline-flex items-center justify-center h-11 px-8 rounded-full text-[11px] tracking-wide2 uppercase font-medium">Załóż konto</button>
        </form>

        <hr class="my-10 md:my-12 hairline border-t"/>

        <h2 class="h-section text-[20px] md:text-[28px] mb-5 md:mb-6">Masz już konto?</h2>
        <a href="login.html" class="btn-ghost-dark pill inline-flex items-center justify-center h-11 px-8 rounded-full text-[11px] tracking-wide2 uppercase font-medium">Zaloguj się</a>
      </div>
    </div>
  </div>
</section>

<div data-release-footer></div>
<script src="../assets/partials.js"></script>
</body>
</html>
