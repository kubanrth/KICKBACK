<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create account — release</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@300;400;500;600&family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="min-h-screen">
<div data-release-header></div>

<section class="onlight bg-white">
  <div class="grid grid-cols-1 md:grid-cols-2">
    <div class="hidden md:block relative md:min-h-[640px] overflow-hidden">
      <img src="https://placehold.co/1200x1500/3a2418/3a2418.png" alt="" class="absolute inset-0 h-full w-full object-cover"/>
    </div>

    <div class="flex items-center md:pl-16 lg:pl-24 px-8 py-16 md:py-20">
      <div class="w-full max-w-[460px]">
        <h1 class="auth-h text-[44px] md:text-[56px] mb-10">Welcome!</h1>

        <form class="space-y-5" onsubmit="event.preventDefault();location.href='account/index.html'">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="auth-label">First name<span class="text-[#b4332a]">*</span></span>
              <input class="auth-input" placeholder="Enter your first name" required/>
            </label>
            <label class="block">
              <span class="auth-label">Last name<span class="text-[#b4332a]">*</span></span>
              <input class="auth-input" placeholder="Enter your last name" required/>
            </label>
          </div>
          <label class="block">
            <span class="auth-label">Email<span class="text-[#b4332a]">*</span></span>
            <input type="email" class="auth-input" placeholder="Enter your email" required/>
          </label>
          <label class="block">
            <span class="auth-label">Password<span class="text-[#b4332a]">*</span></span>
            <input type="password" class="auth-input" placeholder="Enter your password" required/>
          </label>
          <button class="mt-2 inline-flex h-10 px-7 rounded-full bg-black text-white text-[11px] tracking-wide2 uppercase font-medium pill pill-dark">Create account</button>
        </form>

        <hr class="my-12 hairline border-t"/>

        <h2 class="auth-h text-[34px] md:text-[44px] mb-6">Already have an account?</h2>
        <a href="login.html" class="inline-flex h-10 px-7 rounded-full border hairline text-[11px] tracking-wide2 uppercase font-medium pill items-center">Log in</a>
      </div>
    </div>
  </div>
</section>

<div data-release-footer></div>
<script src="../assets/partials.js"></script>
</body>
</html>
