<body class="min-h-screen">
<div data-release-header></div>

<section class="onlight bg-white">
  <div class="mx-auto max-w-[1600px] px-6 md:px-10 pt-10 md:pt-12 pb-4">
    <div class="crumbs text-[11px] tracking-wide2 uppercase text-black/55"><a href="../index.html" class="hover:text-black">Home</a><span class="mx-2">/</span><span class="text-black">Kontakt</span></div>

        <div class="mt-10">

            <div class="flex justify-between border-b hairline py-3"><dt>Niedziela</dt><dd class="text-black/60">10:00 — 16:00</dd></div>
          </dl>
        </div>

        <div class="mt-10 space-y-4 text-[14px] text-black/75">
          <a href="mailto:hello@kickback.pl" class="flex items-center gap-3 hover:text-black"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16v12H4zM4 6l8 7 8-7"/></svg>hello@kickback.pl</a>
          <a href="tel:+48500100100" class="flex items-center gap-3 hover:text-black"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h4l2 5-3 2a11 11 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z"/></svg>+48 500 100 100</a>
          <div class="flex items-start gap-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="mt-1 shrink-0"><path d="M12 22s8-7.58 8-13a8 8 0 0 0-16 0c0 5.42 8 13 8 13Z"/><circle cx="12" cy="9" r="3"/></svg><span>ul. Marszałkowska 1<br/>00-001 Warszawa</span></div>
        </div>

        <div class="mt-10 flex items-center gap-4">
          <a href="#" aria-label="Instagram" class="h-10 w-10 rounded-full border hairline flex items-center justify-center hover:bg-black hover:text-white hover:border-black transition"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".6" fill="currentColor"/></svg></a>

          <a href="#" aria-label="TikTok" class="h-10 w-10 rounded-full border hairline flex items-center justify-center hover:bg-black hover:text-white hover:border-black transition"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3v11a4 4 0 1 1-4-4"/><path d="M15 3a5 5 0 0 0 5 5"/></svg></a>
