<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — release</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@300;400;500;600&family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="min-h-screen">
<div data-release-header></div>

<section class="onlight bg-white">
  <div class="grid grid-cols-1 md:grid-cols-2">
    <div class="relative aspect-[4/5] md:aspect-auto md:min-h-[640px] overflow-hidden">
      <img src="https://placehold.co/1200x1500/1a1a1a/1a1a1a.png" alt="" class="absolute inset-0 h-full w-full object-cover"/>
    </div>

    <div class="flex items-center md:pl-16 lg:pl-24 px-8 py-16 md:py-20">
      <div class="w-full max-w-[420px]">

        <!-- LOGIN FORM -->
        <div id="login-view">
          <h1 class="auth-h text-[44px] md:text-[56px] mb-10">Welcome back!</h1>

          <button class="w-full h-12 rounded-full bg-[#5A31F4] hover:bg-[#4925cf] active:bg-[#3d1eb0] transition-colors text-white text-[13px] font-medium pill flex items-center justify-center gap-1.5">
            Sign in with
            <span class="font-semibold">shop</span>
          </button>

          <div class="my-8 flex items-center gap-4 text-[12px] text-black/50">
            <span class="flex-1 border-t hairline"></span>
            <span>or</span>
            <span class="flex-1 border-t hairline"></span>
          </div>

          <form class="space-y-5" onsubmit="event.preventDefault();location.href='account/index.html'">
            <label class="block">
              <span class="auth-label">Email<span class="text-[#b4332a]">*</span></span>
              <input type="email" class="auth-input" placeholder="Enter your email" required/>
            </label>
            <label class="block">
              <span class="auth-label">Password<span class="text-[#b4332a]">*</span></span>
              <input type="password" class="auth-input" placeholder="Enter your password" required/>
            </label>

            <button class="mt-2 inline-flex h-10 px-7 rounded-full bg-black text-white text-[11px] tracking-wide2 uppercase font-medium pill pill-dark">Log in</button>

            <a href="#recover" onclick="showRecover()" class="block text-[11px] tracking-wide2 uppercase link-underline w-fit">Forgot your password?</a>
          </form>

          <div class="mt-14">
            <h2 class="auth-h text-[34px] md:text-[44px] mb-6">Don't have an account?</h2>
            <a href="register.html" class="inline-flex h-10 px-7 rounded-full border hairline text-[11px] tracking-wide2 uppercase font-medium pill items-center">Create account</a>
          </div>
        </div>

        <!-- RECOVER PASSWORD FORM -->
        <div id="recover-view" hidden>
          <h1 class="auth-h text-[44px] md:text-[56px] mb-6">Recover password</h1>
          <p class="text-[14px] text-black/65 leading-[1.7] mb-8">We'll send you an email to reset your password.</p>

          <form class="space-y-5" onsubmit="event.preventDefault()">
            <label class="block">
              <span class="auth-label">Email<span class="text-[#b4332a]">*</span></span>
              <input type="email" class="auth-input" placeholder="Enter your email" required/>
            </label>
            <button class="mt-2 inline-flex h-10 px-7 rounded-full bg-black text-white text-[11px] tracking-wide2 uppercase font-medium pill pill-dark">Recover</button>
          </form>

          <a href="#login" onclick="showLogin()" class="mt-8 inline-block text-[11px] tracking-wide2 uppercase link-underline">← Back to login</a>
        </div>

      </div>
    </div>
  </div>
</section>

<div data-release-footer></div>
<script src="../assets/partials.js"></script>
<script>
function showRecover(){document.getElementById('login-view').hidden=true;document.getElementById('recover-view').hidden=false;}
function showLogin(){document.getElementById('login-view').hidden=false;document.getElementById('recover-view').hidden=true;}
window.addEventListener('hashchange',()=>location.hash==='#recover'?showRecover():showLogin());
if(location.hash==='#recover')showRecover();
</script>
</body>
</html>
