<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Logowanie — Kickback</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:wght@300;400;500;600&family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="min-h-screen">
<div data-release-header></div>

<section class="onlight bg-white">
  <div class="grid grid-cols-1 md:grid-cols-2">
    <div class="hidden md:block relative md:min-h-[640px] overflow-hidden">
      <img src="../brand_assets/photos/banner-konto.png" alt="" class="absolute inset-0 h-full w-full object-cover"/>
    </div>

    <div class="flex items-center md:pl-16 lg:pl-24 px-8 py-16 md:py-20">
      <div class="w-full max-w-[420px]">

        <!-- LOGIN -->
        <div id="login-view">
          <h1 class="h-section text-[28px] md:text-[36px] mb-10">Logowanie</h1>

          <form class="space-y-6" onsubmit="event.preventDefault();try{localStorage.setItem('demo_auth','1');localStorage.setItem('demo_auth_email',this.email.value);}catch(e){}location.href='account/index.html'">
            <label class="block">
              <span class="auth-label">E-mail<span class="text-[#b4332a]">*</span></span>
              <input type="email" name="email" class="auth-input" placeholder="twoj@email.pl" required/>
            </label>
            <label class="block">
              <span class="auth-label">Hasło<span class="text-[#b4332a]">*</span></span>
              <input type="password" name="password" class="auth-input" placeholder="••••••••" required/>
            </label>

            <button type="submit" class="btn-ghost-dark pill inline-flex items-center justify-center h-11 px-8 rounded-full text-[11px] tracking-wide2 uppercase font-medium">Zaloguj się</button>

            <a href="#recover" onclick="showRecover()" class="block text-[11px] tracking-wide2 uppercase link-underline w-fit mt-1">Nie pamiętasz hasła?</a>
          </form>

          <div class="mt-16">
            <h2 class="h-section text-[22px] md:text-[28px] mb-6">Nie masz konta?</h2>
            <a href="register.html" class="btn-ghost-dark pill inline-flex items-center justify-center h-11 px-8 rounded-full text-[11px] tracking-wide2 uppercase font-medium">Załóż konto</a>
          </div>
        </div>

        <!-- RECOVER -->
        <div id="recover-view" hidden>
          <h1 class="h-section text-[28px] md:text-[36px] mb-6">Odzyskaj hasło</h1>
          <p class="text-[14px] text-black/65 leading-[1.7] mb-8">Wyślemy Ci e-mail do zresetowania hasła.</p>

          <form class="space-y-5" onsubmit="event.preventDefault()">
            <label class="block">
              <span class="auth-label">E-mail<span class="text-[#b4332a]">*</span></span>
              <input type="email" class="auth-input" placeholder="twoj@email.pl" required/>
            </label>
            <button type="submit" class="btn-ghost-dark pill inline-flex items-center justify-center h-11 px-8 rounded-full text-[11px] tracking-wide2 uppercase font-medium">Wyślij link</button>
          </form>

          <a href="#login" onclick="showLogin()" class="mt-8 inline-block text-[11px] tracking-wide2 uppercase link-underline">← Wróć do logowania</a>
        </div>

      </div>
    </div>
  </div>
</section>

<div data-release-footer></div>
<script src="../assets/partials.js"></script>
<script>
function showRecover(){document.getElementById('login-view').hidden=true;document.getElementById('recover-view').hidden=false;}
function showLogin(){document.getElementById('login-view').hidden=false;document.getElementById('recover-view').hidden=true;}
window.addEventListener('hashchange',()=>location.hash==='#recover'?showRecover():showLogin());
if(location.hash==='#recover')showRecover();
</script>
</body>
</html>
